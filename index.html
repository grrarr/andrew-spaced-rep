const TODAY = new Date().toISOString().split("T")[0];
const STORAGE_KEY = "andrew-spaced-rep-v1";
const BACKUP_KEY = "andrew-spaced-rep-v1-backup";
const EXPORT_REMINDER_KEY = "andrew-last-exported";

// ── Utilities ────────────────────────────────────────────────────────────────

const daysBetween = (a, b) => Math.round(Math.abs(new Date(a) - new Date(b)) / 86400000);

const fmtDate = (iso) =>
  new Date(iso + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

const getInterval = (streak, lastResult) =>
  lastResult === "fail" ? 0 : (streak <= 1 ? 3 : streak === 2 ? 7 : streak === 3 ? 14 : 30);

// Normalize attempt: string → {date, result} for migration from old format
const normAttempt = (a) => typeof a === "string" ? { date: a, result: "pass" } : a;

function getDue(q) {
  const attempts = q.attempts.map(normAttempt);
  if (!attempts.length) return { due: true, ago: null, next: 3 };
  const last = attempts[attempts.length - 1];
  const ago = daysBetween(last.date, TODAY);
  // Count consecutive passes from the end; a fail resets to 0
  let streak = 0;
  for (let i = attempts.length - 1; i >= 0; i--) {
    if (attempts[i].result === "pass") streak++;
    else break;
  }
  const next = getInterval(streak, last.result);
  return { due: ago >= next, ago, next };
}

const agoLabel = (d) => (d === null ? "new" : d === 0 ? "today" : `${d}d ago`);

function mergeDefaults(loaded) {
  const defaultsById = new Map(DEFAULT_QUESTIONS.map((d) => [d.id, d]));
  const defaultsByText = new Map(DEFAULT_QUESTIONS.map((d) => [d.question.trim(), d]));
  const matchedDefaultIds = new Set();

  const updated = loaded.map((q) => {
    // Match by id first (handles edited question text), then fall back to text match
    const def = defaultsById.get(q.id) || defaultsByText.get(q.question.trim());
    if (!def) return q;
    matchedDefaultIds.add(def.id);
    const merged = { ...q };
    for (const key of Object.keys(def)) {
      if (key === "id") continue;
      // Overwrite question/solution/notes/kind from defaults (allows edits to propagate)
      if (key === "question" || key === "solution" || key === "notes" || key === "kind") {
        merged[key] = def[key];
      } else if (merged[key] === undefined) {
        merged[key] = def[key];
      }
    }
    return merged;
  });
  // Add entirely new defaults not yet in storage — keep original ids when possible
  let maxId = updated.reduce((m, q) => Math.max(m, q.id), 0);
  const usedIds = new Set(updated.map((q) => q.id));
  const missing = DEFAULT_QUESTIONS.filter((d) => !matchedDefaultIds.has(d.id));
  const merged = [...updated, ...missing.map((d) => usedIds.has(d.id) ? { ...d, id: ++maxId } : d)];
  // Deduplicate by question text — keeps first occurrence (the id-matched one),
  // removes orphan duplicates left by old text-based matching
  const seenText = new Set();
  return merged.filter((q) => {
    const key = q.question.trim();
    if (seenText.has(key)) return false;
    seenText.add(key);
    return true;
  });
}

function nextId(qs) {
  return qs.reduce((m, q) => Math.max(m, q.id), 0) + 1;
}

async function storageLoad() {
  let qs = [];
  for (const key of [STORAGE_KEY, BACKUP_KEY]) {
    if (qs.length) break;
    try {
      const r = await window.storage.get(key);
      if (r?.value) {
        const p = JSON.parse(r.value);
        const arr = Array.isArray(p) ? p : p.questions;
        if (Array.isArray(arr) && arr.length) qs = arr;
      }
    } catch {}
  }
  // Migrate old string-based attempts to {date, result} objects
  qs = qs.map((q) => ({
    ...q,
    attempts: (q.attempts || []).map(normAttempt),
  }));
  return mergeDefaults(qs);
}

async function storageSave(qs, prevCount) {
  if (qs.length === 0 && prevCount > 0) return;
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(qs));
    if (qs.length > 0) {
      await window.storage.set(
        BACKUP_KEY,
        JSON.stringify({ questions: qs, ts: new Date().toISOString() })
      );
    }
  } catch {}
}

// ── GitHub sync helpers ───────────────────────────────────────────────────────

async function ghFetch(token) {
  try {
    const headers = { Accept: "application/vnd.github.v3+json" };
    if (token) headers.Authorization = `token ${token}`;
    const r = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}`,
      { headers }
    );
    if (!r.ok) return null;
    const d = await r.json();
    const parsed = JSON.parse(atob(d.content.replace(/\n/g, "")));
    const qs = Array.isArray(parsed) ? parsed : parsed.questions;
    return Array.isArray(qs) ? { questions: qs, sha: d.sha } : null;
  } catch { return null; }
}

async function ghWrite(token, qs, sha) {
  const content = btoa(unescape(encodeURIComponent(
    JSON.stringify({ version: 1, updated: TODAY, questions: qs }, null, 2)
  )));
  const r = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}`,
    {
      method: "PUT",
      headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify({ message: `Update progress ${TODAY}`, content, ...(sha ? { sha } : {}) }),
    }
  );
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).content.sha;
}

};

const MONO = "'JetBrains Mono', 'SF Mono', 'Consolas', monospace";

// ── Component ────────────────────────────────────────────────────────────────

function SpacedRepTracker() {
  const [qs, setQs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("review");
  const [expanded, setExpanded] = useState(null);
  const [editing, setEditing] = useState(null);
  const [sort, setSort] = useState("stalest");
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState(null);
  const [lastExp, setLastExp] = useState(null);
  const [delConfirm, setDelConfirm] = useState(null);
  const [addT, setAddT] = useState("");
  const [addQ, setAddQ] = useState("");
  const [addN, setAddN] = useState("");
  const [addS, setAddS] = useState("");
  const [addKind, setAddKind] = useState("problem");
  const [kindFilter, setKindFilter] = useState("all");
  const [showSolution, setShowSolution] = useState(null);
  const fileRef = useRef(null);
  const prevCountRef = useRef(0);
  const ghTokenRef = useRef("");
  const ghShaRef = useRef(null);
  const [ghStatus, setGhStatus] = useState("idle"); // idle | loading | synced | saving | error
  const [showGhSetup, setShowGhSetup] = useState(false);
  const [tokenDraft, setTokenDraft] = useState("");

  const flash = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  const save = useCallback(async (newQs) => {
    await storageSave(newQs, prevCountRef.current);
    prevCountRef.current = newQs.length;
    const token = ghTokenRef.current;
    if (token) {
      setGhStatus("saving");
      try {
        // Refresh SHA if stale before writing
        let sha = ghShaRef.current;
        if (!sha) {
          const existing = await ghFetch(token);
          sha = existing?.sha || null;
        }
        const newSha = await ghWrite(token, newQs, sha);
        ghShaRef.current = newSha;
        setGhStatus("synced");
      } catch { setGhStatus("error"); }
    }
  }, []);

  useEffect(() => {
    (async () => {
      // Load GitHub token
      let token = "";
      try {
        const r = await window.storage.get(GH_TOKEN_KEY);
        if (r?.value) { token = r.value; ghTokenRef.current = r.value; }
      } catch {}

      // Try GitHub first (public read works without token; token enables write-back)
      let loaded;
      setGhStatus("loading");
      const ghResult = await ghFetch(token || null);
      if (ghResult) {
        ghShaRef.current = ghResult.sha;
        setGhStatus(token ? "synced" : "idle");
        loaded = mergeDefaults(ghResult.questions.map((q) => ({
          ...q, attempts: (q.attempts || []).map(normAttempt),
        })));
      } else {
        setGhStatus(token ? "error" : "idle");
      }

      // Fall back to localStorage
      if (!loaded) loaded = await storageLoad();

      setQs(loaded);
      prevCountRef.current = loaded.length;
      // Don't save on load — only save on user actions (pass/fail/edit/add).
      // This prevents a stale deploy from overwriting progress.json with old defaults.
      try {
        const r = await window.storage.get(EXPORT_REMINDER_KEY);
        if (r?.value) setLastExp(r.value);
      } catch {}
      setLoading(false);
    })();
  }, []);

  const doAdd = async () => {
    if (!addQ.trim()) return;
    const q = { id: nextId(qs), kind: addKind, tags: [], title: addT.trim() || undefined, question: addQ.trim(), notes: addN.trim(), solution: addS.trim(), dateAdded: TODAY, attempts: [{ date: TODAY, result: "pass" }] };
    const updated = [...qs, q];
    setQs(updated);
    await save(updated);
    setAddT(""); setAddQ(""); setAddN(""); setAddS(""); setAddKind("problem");
    flash("Added");
    setTab("all");
  };

  const hasAttemptToday = (q) => q.attempts.some((a) => normAttempt(a).date === TODAY);

  const doAttempt = async (id, result) => {
    const updated = qs.map((q) => {
      if (q.id !== id) return q;
      // If already attempted today, replace today's result; otherwise append
      const todayIdx = q.attempts.findIndex((a) => normAttempt(a).date === TODAY);
      if (todayIdx >= 0) {
        const newAttempts = [...q.attempts];
        newAttempts[todayIdx] = { date: TODAY, result };
        return { ...q, attempts: newAttempts };
      }
      return { ...q, attempts: [...q.attempts, { date: TODAY, result }] };
    });
    setQs(updated);
    await save(updated);
  };

  const doUndo = async (id) => {
    const updated = qs.map((q) =>
      q.id === id && q.attempts.length ? { ...q, attempts: q.attempts.slice(0, -1) } : q
    );
    setQs(updated);
    await save(updated);
    flash("Last attempt undone");
  };

  const doDel = async (id) => {
    const updated = qs.filter((q) => q.id !== id);
    prevCountRef.current = updated.length;
    setQs(updated);
    await save(updated);
    setDelConfirm(null);
    if (expanded === id) setExpanded(null);
    flash("Deleted");
  };

  const startEdit = (q, field) => setEditing({ id: q.id, field, value: q[field] || "" });

  const commitEdit = async () => {
    if (!editing) return;
    const updated = qs.map((q) =>
      q.id === editing.id ? { ...q, [editing.field]: editing.value.trim() } : q
    );
    setQs(updated);
    await save(updated);
    setEditing(null);
    flash("Saved");
  };

  const doExport = async () => {
    const data = JSON.stringify({ version: 1, exported: TODAY, questions: qs }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    Object.assign(document.createElement("a"), { href: url, download: `andrew-spaced-rep-${TODAY}.json` }).click();
    URL.revokeObjectURL(url);
    setLastExp(TODAY);
    try { await window.storage.set(EXPORT_REMINDER_KEY, TODAY); } catch {}
    flash("Exported");
  };

  const doImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const incoming = Array.isArray(parsed) ? parsed : parsed.questions;
        if (!Array.isArray(incoming)) throw new Error("bad format");
        const existingTexts = new Set(qs.map((q) => q.question.trim()));
        const fresh = incoming.filter((q) => !existingTexts.has(q.question.trim()));
        let id = nextId(qs) - 1;
        const renumbered = fresh.map((q) => ({ ...q, id: ++id }));
        const merged = [...qs, ...renumbered];
        setQs(merged);
        await save(merged);
        flash(`${renumbered.length} added, ${incoming.length - renumbered.length} dupes skipped`);
      } catch { flash("Import failed: invalid JSON"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const doSaveToken = async () => {
    const t = tokenDraft.trim();
    if (!t) return;
    await window.storage.set(GH_TOKEN_KEY, t);
    ghTokenRef.current = t;
    setShowGhSetup(false);
    setTokenDraft("");
    // Push current data to GitHub immediately
    setGhStatus("saving");
    try {
      const existing = await ghFetch(t);
      const sha = existing?.sha || null;
      const newSha = await ghWrite(t, qs, sha);
      ghShaRef.current = newSha;
      setGhStatus("synced");
      flash("Connected to GitHub");
    } catch {
      setGhStatus("error");
      flash("Token saved, but sync failed — check PAT permissions");
    }
  };

  const doClearToken = async () => {
    await window.storage.set(GH_TOKEN_KEY, "");
    ghTokenRef.current = "";
    ghShaRef.current = null;
    setGhStatus("idle");
    setShowGhSetup(false);
    flash("GitHub sync disabled");
  };

  // ── Derived ──

  const dueQs = qs.filter((q) => getDue(q).due);
  const expAgo = lastExp ? daysBetween(lastExp, TODAY) : null;
  const expWarn = expAgo === null ? "Never exported" : expAgo === 0 ? null : `Exported ${expAgo}d ago`;

  const list = tab === "review" ? dueQs : qs;
  const kindFiltered = kindFilter === "all" ? list : list.filter((q) => (q.kind || "problem") === kindFilter);
  const searched = search
    ? kindFiltered.filter((q) =>
        q.question.toLowerCase().includes(search.toLowerCase()) ||
        (q.title && q.title.toLowerCase().includes(search.toLowerCase())) ||
        (q.notes && q.notes.toLowerCase().includes(search.toLowerCase()))
      )
    : kindFiltered;

  const sorted = [...searched].sort((a, b) => {
    // In review tab, push failed-today questions to the bottom
    if (tab === "review") {
      const aFail = hasAttemptToday(a) && a.attempts.map(normAttempt).find((x) => x.date === TODAY)?.result === "fail";
      const bFail = hasAttemptToday(b) && b.attempts.map(normAttempt).find((x) => x.date === TODAY)?.result === "fail";
      if (aFail !== bFail) return aFail ? 1 : -1;
    }
    if (sort === "stalest") {
      const aL = a.attempts.length ? normAttempt(a.attempts[a.attempts.length - 1]).date : "0000";
      const bL = b.attempts.length ? normAttempt(b.attempts[b.attempts.length - 1]).date : "0000";
      return aL < bL ? -1 : aL > bL ? 1 : 0;
    }
    if (sort === "oldest") return a.dateAdded < b.dateAdded ? -1 : 1;
    return a.dateAdded > b.dateAdded ? -1 : 1;
  });

  // ── Render ──

  if (loading)
    return (
      <div style={{ background: C.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.dim, fontFamily: MONO, fontSize: 13 }}>
        Loading...
      </div>
    );

  const tabBtn = (name, label) => (
    <button onClick={() => setTab(name)} style={{
      ...btn("transparent", tab === name ? C.accent : C.dim),
      borderBottom: `2px solid ${tab === name ? C.accent : "transparent"}`,
      borderRadius: 0, padding: "8px 16px", fontWeight: tab === name ? 600 : 400,
    }}>
      {label}
    </button>
  );

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: FONT, padding: "20px 16px" }}>
      <div style={{ maxWidth: 640, margin: "0 auto" }}>

        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 600 }}>Andrew Spaced Rep</div>
            <div style={{ fontSize: 12, color: C.dim, fontFamily: MONO, marginTop: 2 }}>
              {qs.length} question{qs.length !== 1 ? "s" : ""} ·{" "}
              <span style={{ color: dueQs.length ? C.warn : C.dim }}>{dueQs.length} due</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <button onClick={() => window.print()} style={btn(C.card, C.dim)} title="Print all questions & solutions">Print</button>
            <button onClick={doExport} style={btn(C.card, C.dim)} title="Download JSON backup">Export</button>
            <button onClick={() => fileRef.current?.click()} style={btn(C.card, C.dim)} title="Import from JSON file">Import</button>
            <input ref={fileRef} type="file" accept=".json" onChange={doImport} style={{ display: "none" }} />
            <button
              onClick={() => setShowGhSetup(!showGhSetup)}
              style={btn(C.card, ghStatus === "synced" ? C.good : ghStatus === "error" ? C.danger : ghStatus === "loading" || ghStatus === "saving" ? C.warn : C.dim)}
              title={ghStatus === "synced" ? "Synced to GitHub" : ghStatus === "error" ? "GitHub sync error" : "Set up GitHub sync"}
            >
              {ghStatus === "saving" ? "Saving…" : ghStatus === "loading" ? "Loading…" : ghStatus === "synced" ? "● GH" : ghStatus === "error" ? "⚠ GH" : "GH"}
            </button>
          </div>
        </div>

        {/* GitHub setup panel */}
        {showGhSetup && (
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px 12px", marginBottom: 10 }}>
            <div style={{ fontSize: 12, color: C.dim, fontFamily: MONO, marginBottom: 6 }}>
              GitHub Personal Access Token — grants cross-browser sync via {GH_DATA_PATH}
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
              <input
                value={tokenDraft}
                onChange={(e) => setTokenDraft(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && doSaveToken()}
                placeholder="ghp_..."
                type="password"
                style={{ ...inputStyle, flex: 1, minWidth: 160, fontSize: 13, padding: "5px 10px" }}
              />
              <button onClick={doSaveToken} disabled={!tokenDraft.trim()} style={{ ...btn(C.accent), opacity: tokenDraft.trim() ? 1 : 0.4 }}>Save</button>
              {ghTokenRef.current && <button onClick={doClearToken} style={btn(C.card, C.danger)}>Disconnect</button>}
            </div>
            <div style={{ fontSize: 11, color: C.dim, fontFamily: MONO, marginTop: 6 }}>
              Create at github.com/settings/tokens — needs Contents: Read & Write on this repo
            </div>
          </div>
        )}

        {/* Export warning */}
        {expWarn && (
          <div style={{ background: "#1a1400", border: `1px solid ${C.warn}33`, borderRadius: 6, padding: "6px 12px", marginBottom: 12, fontSize: 12, color: C.warn, fontFamily: MONO }}>
            {expWarn}
          </div>
        )}

        {/* Toast */}
        {toast && (
          <div style={{ background: C.accent + "18", border: `1px solid ${C.accent}33`, borderRadius: 6, padding: "6px 12px", marginBottom: 12, fontSize: 13, color: C.accent, fontFamily: MONO, textAlign: "center" }}>
            {toast}
          </div>
        )}

        {/* Tabs */}
        <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, marginBottom: 12 }}>
          {tabBtn("review", `Review${dueQs.length ? ` (${dueQs.length})` : ""}`)}
          {tabBtn("all", "All")}
          {tabBtn("add", "+ Add")}
        </div>

        {/* Add form */}
        {tab === "add" && (
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: 16, marginBottom: 16 }}>
            <input value={addT} onChange={(e) => setAddT(e.target.value)} placeholder="Title (optional)..."
              style={{ ...inputStyle, fontSize: 13, marginBottom: 8 }} />
            <textarea value={addQ} onChange={(e) => setAddQ(e.target.value)} placeholder="Problem text..."
              style={{ ...inputStyle, minHeight: 80, resize: "vertical" }} />
            <input value={addN} onChange={(e) => setAddN(e.target.value)} placeholder="Notes (optional)..."
              style={{ ...inputStyle, fontSize: 13, marginTop: 8 }} />
            <textarea value={addS} onChange={(e) => setAddS(e.target.value)} placeholder="Solution (optional, hidden until revealed)..."
              style={{ ...inputStyle, fontSize: 13, marginTop: 8, minHeight: 60, resize: "vertical" }} />
            <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
              {[["problem", "Problem"], ["concept", "Concept"]].map(([v, l]) => (
                <button key={v} onClick={() => setAddKind(v)} style={pillBtn(addKind === v)}>{l}</button>
              ))}
            </div>
            <button onClick={doAdd} disabled={!addQ.trim()}
              style={{ ...btn(C.accent), marginTop: 10, opacity: addQ.trim() ? 1 : 0.4, cursor: addQ.trim() ? "pointer" : "default" }}>
              Add Question
            </button>
          </div>
        )}

        {/* Sort & Search */}
        {tab !== "add" && (
          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
            <div style={{ display: "flex", gap: 4 }}>
              {[["stalest", "Stalest"], ["oldest", "Oldest"], ["newest", "Newest"]].map(([v, l]) => (
                <button key={v} onClick={() => setSort(v)} style={pillBtn(sort === v)}>{l}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {[["all", "All"], ["problem", "Problems"], ["concept", "Concepts"]].map(([v, l]) => (
                <button key={v} onClick={() => setKindFilter(v)} style={pillBtn(kindFilter === v)}>{l}</button>
              ))}
            </div>
            {tab === "all" && (
              <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search..."
                style={{ ...inputStyle, width: "auto", flex: 1, minWidth: 100, fontSize: 13, padding: "4px 10px" }} />
            )}
          </div>
        )}

        {/* Question list */}
        {tab !== "add" && (sorted.length === 0 ? (
          <div style={{ textAlign: "center", padding: "48px 0", color: C.dim, fontFamily: MONO, fontSize: 13 }}>
            {tab === "review" ? "Nothing due. All caught up." : search ? "No matches." : "No questions yet."}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {sorted.map((q) => {
              const { due, ago, next } = getDue(q);
              const doneToday = hasAttemptToday(q);
              const todayResult = doneToday ? q.attempts.map(normAttempt).find((a) => a.date === TODAY)?.result : null;
              const isExp = expanded === q.id;
              const isDel = delConfirm === q.id;
              const isEditing = editing?.id === q.id;

              return (
                <div key={q.id} style={{ background: C.card, border: `1px solid ${due ? C.warn + "44" : C.border}`, borderRadius: 8, overflow: "hidden" }}>
                  {/* Card header */}
                  <div style={{ padding: "10px 14px", cursor: "pointer", display: "flex", gap: 10, alignItems: "flex-start" }}
                    onClick={() => setExpanded(isExp ? null : q.id)}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      {isEditing ? (
                        <div onClick={(e) => e.stopPropagation()}>
                          <div style={{ fontSize: 11, color: C.dim, fontFamily: MONO, marginBottom: 4 }}>
                            editing {editing.field}
                          </div>
                          <textarea value={editing.value} onChange={(e) => setEditing({ ...editing, value: e.target.value })}
                            style={{ ...inputStyle, borderColor: C.accent, minHeight: 60, resize: "vertical" }} />
                          <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                            <button onClick={commitEdit} style={btn(C.accent)}>Save</button>
                            <button onClick={() => setEditing(null)} style={btn(C.card, C.dim)}>Cancel</button>
                          </div>
                        </div>
                      ) : (
                        <>
                          <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 2 }}>
                            {q.title && <span style={{ fontSize: 11, color: C.dim, fontFamily: MONO }}>{q.title}</span>}
                            <span style={{ fontSize: 9, fontFamily: MONO, fontWeight: 600, letterSpacing: "0.05em", padding: "1px 5px", borderRadius: 3, background: (q.kind || "problem") === "concept" ? "#6366f1" + "22" : C.accent + "22", color: (q.kind || "problem") === "concept" ? "#818cf8" : C.accent }}>{(q.kind || "problem").toUpperCase()}</span>
                          </div>
                          <div style={{ fontSize: 14, lineHeight: 1.5, whiteSpace: "pre-line", overflow: "hidden",
                            display: "-webkit-box", WebkitLineClamp: isExp ? 999 : 2, WebkitBoxOrient: "vertical" }}>
                            {q.question}
                          </div>
                          {q.notes && <div style={{ fontSize: 12, color: C.dim, marginTop: 4, fontStyle: "italic" }}>{q.notes}</div>}
                        </>
                      )}
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2, flexShrink: 0 }}>
                      <div style={{ fontFamily: MONO, fontSize: 12, fontWeight: 500, padding: "2px 8px", borderRadius: 4,
                        background: due ? C.warn + "22" : todayResult === "pass" ? C.good + "22" : todayResult === "fail" ? C.danger + "22" : C.bg,
                        color: due && !doneToday ? C.warn : todayResult === "pass" ? C.good : todayResult === "fail" ? C.danger : C.dim }}>
                        {doneToday ? (todayResult === "pass" ? "✓ today" : "✗ today") : agoLabel(ago)}
                      </div>
                      <div style={{ fontFamily: MONO, fontSize: 10, color: C.dim }}>{q.attempts.length}x · {next}d</div>
                    </div>
                  </div>

                  {/* Expanded panel */}
                  {isExp && !isEditing && (
                    <div style={{ borderTop: `1px solid ${C.border}`, padding: "10px 14px", background: C.cardAlt }}>
                      <div style={{ fontFamily: MONO, fontSize: 11, color: C.dim, marginBottom: 10, lineHeight: 1.6 }}>
                        <div>
                          Attempts ({q.attempts.length}):{" "}
                          {q.attempts.length
                            ? q.attempts.map(normAttempt).map((a) => {
                                const d = daysBetween(a.date, TODAY);
                                const icon = a.result === "pass" ? "✓" : "✗";
                                const color = a.result === "pass" ? C.good : C.danger;
                                return <span key={a.date + a.result} style={{ color }}>{icon}{fmtDate(a.date)} ({d === 0 ? "today" : d + "d ago"})</span>;
                              }).reduce((acc, el, i) => i === 0 ? [el] : [...acc, ", ", el], [])
                            : "none"}
                        </div>
                        <div style={{ marginTop: 2 }}>Added {fmtDate(q.dateAdded)} · Next interval: {next}d</div>
                      </div>
                      {/* Solution reveal */}
                      {q.solution && (
                        <div style={{ marginBottom: 10 }}>
                          <button onClick={(e) => { e.stopPropagation(); setShowSolution(showSolution === q.id ? null : q.id); }}
                            style={{ ...btn(C.card, showSolution === q.id ? C.accent : C.dim), border: `1px solid ${showSolution === q.id ? C.accent + "44" : C.border}`, fontSize: 12, marginBottom: showSolution === q.id ? 8 : 0 }}>
                            {showSolution === q.id ? "▲ Hide Solution" : "▼ Show Solution"}
                          </button>
                          {showSolution === q.id && (
                            <div style={{ background: C.bg, border: `1px solid ${C.good}33`, borderRadius: 6, padding: "10px 12px", fontSize: 13, lineHeight: 1.6, whiteSpace: "pre-line", color: C.good }}>
                              {q.solution}
                            </div>
                          )}
                        </div>
                      )}
                      {isDel ? (
                        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                          <span style={{ fontSize: 13, color: C.danger }}>Delete this question?</span>
                          <button onClick={() => doDel(q.id)} style={btn(C.danger)}>Yes, delete</button>
                          <button onClick={() => setDelConfirm(null)} style={btn(C.card, C.dim)}>Cancel</button>
                        </div>
                      ) : (
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          <button onClick={(e) => { e.stopPropagation(); doAttempt(q.id, "pass"); }}
                            style={{ ...btn(todayResult === "pass" ? C.good + "33" : C.good, todayResult === "pass" ? C.good : "#fff"),
                              cursor: "pointer" }}>
                            {todayResult === "pass" ? "✓ Got it" : "✓ Got it"}
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); doAttempt(q.id, "fail"); }}
                            style={{ ...btn(todayResult === "fail" ? C.danger + "33" : C.danger, todayResult === "fail" ? C.danger : "#fff"),
                              cursor: "pointer" }}>
                            {todayResult === "fail" ? "✗ Missed" : "✗ Missed it"}
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); startEdit(q, "title"); }} style={btn(C.card, C.dim)}>Edit Title</button>
                          <button onClick={(e) => { e.stopPropagation(); startEdit(q, "question"); }} style={btn(C.card, C.dim)}>Edit Q</button>
                          <button onClick={(e) => { e.stopPropagation(); startEdit(q, "notes"); }} style={btn(C.card, C.dim)}>Edit Notes</button>
                          <button onClick={(e) => { e.stopPropagation(); startEdit(q, "solution"); }} style={btn(C.card, C.dim)}>Edit Solution</button>
                          <button onClick={(e) => { e.stopPropagation(); doUndo(q.id); }} disabled={!q.attempts.length}
                            style={{ ...btn(C.card, C.dim), opacity: q.attempts.length ? 1 : 0.3, cursor: q.attempts.length ? "pointer" : "default" }}>
                            Undo attempt
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); setDelConfirm(q.id); }} style={btn(C.card, C.danger)}>Delete</button>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Print view — hidden on screen, shown only when printing */}
      <div id="print-view" style={{ display: "none" }}>
        <h1>Spaced Rep — All Questions</h1>
        {qs.map((q, i) => (
          <div key={q.id} className="print-q">
            <div className="print-q-header">
              Q{i + 1}{q.title ? `: ${q.title}` : ""}
              <span className="print-kind">{(q.kind || "problem").toUpperCase()}</span>
            </div>
            <div className="print-label">Question</div>
            <div className="print-body">{q.question}</div>
            {q.notes && <>
              <div className="print-label">Notes</div>
              <div className="print-body">{q.notes}</div>
            </>}
            {q.solution && <>
              <div className="print-label">Solution</div>
              <div className="print-body">{q.solution}</div>
            </>}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SpacedRepTracker />);

  </script>
</body>
</html>
